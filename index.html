<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Грибной Шифратор</title>
<style>
body {
    background: black;
    color: #00ff00;
    font-family: monospace;
    text-align: center;
    padding: 20px;
}

h1 {
    font-size: 32px;
    text-shadow: 0 0 10px #00ff00;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

textarea {
    width: 40%;
    height: 200px;
    background: #111;
    color: #00ff00;
    border: 1px solid #00ff00;
    padding: 10px;
    font-size: 16px;
}

select {
    margin: 10px;
    padding: 5px;
    background: black;
    color: #00ff00;
    border: 1px solid #00ff00;
}
</style>
</head>
<body>

<h1>🍄 ГРИБОЧКИ ШИФР 🍄</h1>

<select id="mode">
    <option value="encrypt">Русский → Шифр</option>
    <option value="decrypt">Шифр → Русский</option>
</select>

<div class="container">
    <textarea id="input" placeholder="Ввод"></textarea>
    <textarea id="output" placeholder="Вывод" readonly></textarea>
</div>

<script>

// Алфавит
const alphabet = "абвгдеёжзийклмнопрстуфхцчшщъыьэюя .,!?";

// Генерация 3 уникальных символов для каждой буквы
const symbols = "!@#$%^&*()_+-=<>?/{}[]~1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";

let map = {};
let reverseMap = {};

let used = [];

function getRandomSymbol() {
    let s;
    do {
        s = symbols[Math.floor(Math.random() * symbols.length)];
    } while (used.includes(s));
    used.push(s);
    return s;
}

alphabet.split("").forEach(letter => {
    map[letter] = [getRandomSymbol(), getRandomSymbol(), getRandomSymbol()];
    map[letter].forEach(sym => {
        reverseMap[sym] = letter;
    });
});

function encrypt(text) {
    let result = "";
    text = text.toLowerCase();
    for (let char of text) {
        if (map[char]) {
            let arr = map[char];
            result += arr[Math.floor(Math.random() * 3)];
        }
    }
    return result;
}

function decrypt(text) {
    let result = "";
    for (let char of text) {
        if (reverseMap[char]) {
            result += reverseMap[char];
        }
    }
    return result;
}

document.getElementById("input").addEventListener("input", function() {
    const mode = document.getElementById("mode").value;
    const text = this.value;

    if (mode === "encrypt") {
        document.getElementById("output").value = encrypt(text);
    } else {
        document.getElementById("output").value = decrypt(text);
    }
});

</script>

</body>
</html>
