<script>

const alphabet = "邪斜胁谐写械褢卸蟹懈泄泻谢屑薪芯锌褉褋褌褍褎褏褑褔褕褖褗褘褜褝褞褟 .,!?";

// 袚械薪械褉懈褉褍械屑 袙小袝 锌械褔邪褌薪褘械 ASCII 褋懈屑胁芯谢褘
let symbolPool = "";
for (let i = 33; i <= 126; i++) {
    symbolPool += String.fromCharCode(i);
}

// 袛芯斜邪胁谢褟械屑 斜械蟹芯锌邪褋薪褘械 Unicode 褋懈屑胁芯谢褘
symbolPool += "隆垄拢陇楼娄搂篓漏陋芦卢庐炉掳卤虏鲁麓碌露路赂鹿潞禄录陆戮驴";

// 袩褉械胁褉邪褖邪械屑 胁 屑邪褋褋懈胁
symbolPool = symbolPool.split("");

let cipherMap = {};
let reverseMap = {};
let used = new Set();
let poolIndex = 0;

function getUniqueSymbol() {
    if (poolIndex >= symbolPool.length) {
        console.error("小懈屑胁芯谢褘 蟹邪泻芯薪褔懈谢懈褋褜!");
        return "?";
    }
    let sym = symbolPool[poolIndex];
    used.add(sym);
    poolIndex++;
    return sym;
}

// 褋芯蟹写邪褢屑 褎懈泻褋懈褉芯胁邪薪薪褍褞 泻邪褉褌褍
for (let char of alphabet) {
    cipherMap[char] = [];
    for (let i = 0; i < 3; i++) {
        let sym = getUniqueSymbol();
        cipherMap[char].push(sym);
        reverseMap[sym] = char;
    }
}

function encrypt(text) {
    text = text.toLowerCase();
    let result = "";
    for (let char of text) {
        if (cipherMap[char]) {
            let arr = cipherMap[char];
            result += arr[Math.floor(Math.random() * 3)];
        } else {
            result += char;
        }
    }
    return result;
}

function decrypt(text) {
    let result = "";
    for (let char of text) {
        if (reverseMap[char]) {
            result += reverseMap[char];
        } else {
            result += char;
        }
    }
    return result;
}

document.getElementById("input").addEventListener("input", function() {
    const mode = document.getElementById("mode").value;
    const text = this.value;

    if (mode === "encrypt") {
        document.getElementById("output").value = encrypt(text);
    } else {
        document.getElementById("output").value = decrypt(text);
    }
});

</script>
