<script>

const alphabet = "邪斜胁谐写械褢卸蟹懈泄泻谢屑薪芯锌褉褋褌褍褎褏褑褔褕褖褗褘褜褝褞褟 .,!?";

// 袘芯谢褜褕芯泄 锌褍谢 斜械蟹芯锌邪褋薪褘褏 褋懈屑胁芯谢芯胁 (褉邪斜芯褌邪褞褌 胁 Telegram / Discord)
const symbolPool = 
"!@#$%^&*()_+-=<>?/{}[]~`|" +
"0123456789" +
"ABCDEFGHIJKLMNOPQRSTUVWXYZ" +
"abcdefghijklmnopqrstuvwxyz";

let cipherMap = {};
let reverseMap = {};
let used = new Set();

// 褎褍薪泻褑懈褟 锌芯谢褍褔械薪懈褟 褍薪懈泻邪谢褜薪芯谐芯 褋懈屑胁芯谢邪
function getUniqueSymbol() {
    for (let char of symbolPool) {
        if (!used.has(char)) {
            used.add(char);
            return char;
        }
    }
    return null; // 械褋谢懈 蟹邪泻芯薪褔懈谢懈褋褜
}

// 褋芯蟹写邪褢屑 褎懈泻褋懈褉芯胁邪薪薪褍褞 泻邪褉褌褍
for (let char of alphabet) {
    cipherMap[char] = [];
    for (let i = 0; i < 3; i++) {
        let symbol = getUniqueSymbol();
        cipherMap[char].push(symbol);
        reverseMap[symbol] = char;
    }
}

function encrypt(text) {
    text = text.toLowerCase();
    let result = "";
    for (let char of text) {
        if (cipherMap[char]) {
            let arr = cipherMap[char];
            result += arr[Math.floor(Math.random() * 3)];
        } else {
            result += char; // 械褋谢懈 褋懈屑胁芯谢邪 薪械褌 胁 泻邪褉褌械
        }
    }
    return result;
}

function decrypt(text) {
    let result = "";
    for (let char of text) {
        if (reverseMap[char]) {
            result += reverseMap[char];
        } else {
            result += char;
        }
    }
    return result;
}

document.getElementById("input").addEventListener("input", function() {
    const mode = document.getElementById("mode").value;
    const text = this.value;

    if (mode === "encrypt") {
        document.getElementById("output").value = encrypt(text);
    } else {
        document.getElementById("output").value = decrypt(text);
    }
});

</script>
