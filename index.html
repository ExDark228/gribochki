<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🍄 Gribochki Cipher</title>

<style>
body {
    background: black;
    color: #00ff66;
    font-family: monospace;
    text-align: center;
    padding: 20px;
}

h1 {
    text-shadow: 0 0 15px #00ff66;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

textarea {
    width: 40%;
    height: 220px;
    background: #111;
    color: #00ff66;
    border: 1px solid #00ff66;
    padding: 10px;
    font-size: 16px;
    resize: none;
}

select {
    margin: 15px;
    padding: 6px;
    background: black;
    color: #00ff66;
    border: 1px solid #00ff66;
}

button {
    margin-top: 10px;
    padding: 8px 15px;
    background: black;
    color: #00ff66;
    border: 1px solid #00ff66;
    cursor: pointer;
}

button:hover {
    background: #003300;
}
</style>
</head>

<body>

<h1>🍄 GRIBOCHKI CIPHER 🍄</h1>

<select id="mode">
    <option value="encrypt">Русский → Шифр</option>
    <option value="decrypt">Шифр → Русский</option>
</select>

<div class="container">
<textarea id="input" placeholder="Ввод"></textarea>

<div>
<textarea id="output" placeholder="Вывод" readonly></textarea>
<br>
<button onclick="copyText()">📋 Скопировать</button>
</div>
</div>

<script>

window.onload = function() {

const cipherMap = {
'а': 'Xp7','б': 'qL2','в': 'mZ9','г': 'Rt4','д': 'Kb8',
'е': 'Ny3','ё': 'Vz6','ж': 'Hs1','з': 'Qw5','и': 'Tc0',
'й': 'Ua9','к': 'Df7','л': 'Px2','м': 'Gr8','н': 'Zo4',
'о': 'Lm6','п': 'Jt3','р': 'Se9','с': 'Wx1','т': 'Bc5',
'у': 'Ev7','ф': 'Iy2','х': 'Or8','ц': 'Kd4','ч': 'Mz6',
'ш': 'Qa1','щ': 'Hp5','ъ': 'Tu9','ы': 'Ls3','ь': 'Xc8',
'э': 'Rg2','ю': 'Vk7','я': 'Bn4',
' ': 'Zx9','.' : 'Aa5',',' : 'Pp2','!' : 'Yy7','?' : 'Qq3'
};

let reverseMap = {};
for (let key in cipherMap) {
    reverseMap[cipherMap[key]] = key;
}

function encrypt(text) {
    text = text.toLowerCase();
    let result = "";
    for (let char of text) {
        if (cipherMap[char]) {
            result += cipherMap[char];
        }
    }
    return result;
}

function decrypt(text) {
    let result = "";
    for (let i = 0; i < text.length; i += 3) {
        let chunk = text.substring(i, i + 3);
        if (reverseMap[chunk]) {
            result += reverseMap[chunk];
        }
    }
    return result;
}

document.getElementById("input").addEventListener("input", function() {
    const mode = document.getElementById("mode").value;
    const text = this.value;

    if (mode === "encrypt") {
        document.getElementById("output").value = encrypt(text);
    } else {
        document.getElementById("output").value = decrypt(text);
    }
});

};

function copyText() {
    const output = document.getElementById("output");
    output.select();
    document.execCommand("copy");
    alert("Текст скопирован!");
}

</script>

</body>
</html>
