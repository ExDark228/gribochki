<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GRIBOCHKI</title>

<style>
body {
    background: black;
    color: #00ff66;
    font-family: monospace;
    text-align: center;
    padding: 20px;
}

h1 {
    text-shadow: 0 0 10px #00ff66;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

textarea {
    width: 40%;
    height: 200px;
    background: #111;
    color: #00ff66;
    border: 1px solid #00ff66;
    padding: 10px;
    font-size: 16px;
    resize: none;
}

select {
    margin: 15px;
    padding: 6px;
    background: black;
    color: #00ff66;
    border: 1px solid #00ff66;
}
</style>
</head>
<body>

<h1>🍄 GRIBOCHKI CIPHER 🍄</h1>

<select id="mode">
    <option value="encrypt">Русский → Шифр</option>
    <option value="decrypt">Шифр → Русский</option>
</select>

<div class="container">
<textarea id="input" placeholder="Ввод"></textarea>
<textarea id="output" placeholder="Вывод" readonly></textarea>
</div>

<script>

const alphabet = "абвгдеёжзийклмнопрстуфхцчшщъыьэюя .,!?";
const symbolPool = "!@#$%^&*()_+-=<>?/{}[]~1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";

let cipherMap = {};
let reverseMap = {};
let usedSymbols = [];
let symbolIndex = 0;

// создаём фиксированную карту
for (let char of alphabet) {
    cipherMap[char] = [];
    for (let i = 0; i < 3; i++) {
        let symbol = symbolPool[symbolIndex];
        cipherMap[char].push(symbol);
        reverseMap[symbol] = char;
        symbolIndex++;
    }
}

function encrypt(text) {
    text = text.toLowerCase();
    let result = "";
    for (let char of text) {
        if (cipherMap[char]) {
            let arr = cipherMap[char];
            result += arr[Math.floor(Math.random() * 3)];
        }
    }
    return result;
}

function decrypt(text) {
    let result = "";
    for (let char of text) {
        if (reverseMap[char]) {
            result += reverseMap[char];
        }
    }
    return result;
}

document.getElementById("input").addEventListener("input", function() {
    const mode = document.getElementById("mode").value;
    const text = this.value;

    if (mode === "encrypt") {
        document.getElementById("output").value = encrypt(text);
    } else {
        document.getElementById("output").value = decrypt(text);
    }
});

</script>

</body>
</html>
