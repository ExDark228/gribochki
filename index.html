<script>

window.onload = function() {

const alphabet = "邪斜胁谐写械褢卸蟹懈泄泻谢屑薪芯锌褉褋褌褍褎褏褑褔褕褖褗褘褜褝褞褟 .,!?";

let cipherMap = {};
let reverseMap = {};

function generateCode(index) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let a = chars[index % chars.length];
    let b = chars[Math.floor(index / chars.length) % chars.length];
    let c = chars[Math.floor(index / (chars.length * chars.length)) % chars.length];
    return a + b + c;
}

alphabet.split("").forEach((char, index) => {
    let code = generateCode(index);
    cipherMap[char] = code;
    reverseMap[code] = char;
});

function encrypt(text) {
    text = text.toLowerCase();
    let result = "";
    for (let char of text) {
        if (cipherMap[char]) {
            result += cipherMap[char];
        }
    }
    return result;
}

function decrypt(text) {
    let result = "";
    for (let i = 0; i < text.length; i += 3) {
        let chunk = text.substring(i, i + 3);
        if (reverseMap[chunk]) {
            result += reverseMap[chunk];
        }
    }
    return result;
}

document.getElementById("input").addEventListener("input", function() {
    const mode = document.getElementById("mode").value;
    const text = this.value;

    if (mode === "encrypt") {
        document.getElementById("output").value = encrypt(text);
    } else {
        document.getElementById("output").value = decrypt(text);
    }
});

};

</script>
