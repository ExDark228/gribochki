<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GRIBOCHKI CIPHER</title>

<style>
body {
    background: #050505;
    color: #00ff88;
    font-family: monospace;
    text-align: center;
    padding: 20px;
}

h1 {
    font-size: 30px;
    text-shadow: 0 0 15px #00ff88;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

textarea {
    width: 40%;
    height: 220px;
    background: black;
    color: #00ff88;
    border: 1px solid #00ff88;
    padding: 10px;
    font-size: 16px;
    resize: none;
}

select {
    margin: 15px;
    padding: 6px;
    background: black;
    color: #00ff88;
    border: 1px solid #00ff88;
}
</style>
</head>
<body>

<h1>🍄 GRIBOCHKI CIPHER 🍄</h1>

<select id="mode">
    <option value="encrypt">Русский → Шифр</option>
    <option value="decrypt">Шифр → Русский</option>
</select>

<div class="container">
<textarea id="input" placeholder="Ввод"></textarea>
<textarea id="output" placeholder="Вывод" readonly></textarea>
</div>

<script>

// ФИКСИРОВАННЫЙ словарь
const cipherMap = {
'а': ['@','7','q'],
'б': ['%','T','2'],
'в': ['&','L','8'],
'г': ['#','Z','4'],
'д': ['^','M','6'],
'е': ['!','R','1'],
'ё': ['~','X','5'],
'ж': ['+','K','9'],
'з': ['=','P','3'],
'и': ['<','V','0'],
'й': ['>','H','$'],
'к': ['?','G','A'],
'л': ['{','B','C'],
'м': ['}','D','E'],
'н': ['[','F','I'],
'о': [']','J','N'],
'п': ['(',')','O'],
'р': ['*','Q','S'],
'с': ['-','U','W'],
'т': ['_','Y','a'],
'у': ['b','c','d'],
'ф': ['e','f','g'],
'х': ['h','i','j'],
'ц': ['k','l','m'],
'ч': ['n','o','p'],
'ш': ['r','s','t'],
'щ': ['u','v','w'],
'ъ': ['x','y','z'],
'ы': ['1','2','3'],
'ь': ['4','5','6'],
'э': ['7','8','9'],
'ю': ['!','?',';'],
'я': [':','/','|'],
' ': ['.','~','`'],
'.': [',','<','>'],
',': [';','+','='],
'!': ['^','%','&'],
'?': ['#','$','*']
};

// Создание обратной карты
const reverseMap = {};
for (let letter in cipherMap) {
    cipherMap[letter].forEach(sym => {
        reverseMap[sym] = letter;
    });
}

function encrypt(text) {
    text = text.toLowerCase();
    let result = "";
    for (let char of text) {
        if (cipherMap[char]) {
            let arr = cipherMap[char];
            result += arr[Math.floor(Math.random() * 3)];
        }
    }
    return result;
}

function decrypt(text) {
    let result = "";
    for (let char of text) {
        if (reverseMap[char]) {
            result += reverseMap[char];
        }
    }
    return result;
}

document.getElementById("input").addEventListener("input", function() {
    const mode = document.getElementById("mode").value;
    const text = this.value;

    if (mode === "encrypt") {
        document.getElementById("output").value = encrypt(text);
    } else {
        document.getElementById("output").value = decrypt(text);
    }
});
</script>

</body>
</html>
